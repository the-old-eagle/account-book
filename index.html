<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>记账本 · 在线记账</title>
  <link rel="stylesheet" href="style.css" />
  <!-- SheetJS：主 CDN，失败时回退到 cdnjs -->
  <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
  <script>
    // 主 CDN 加载失败时回退
    if (!window.XLSX) {
      document.write('<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"><\/script>');
    }
  </script>
  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <!-- 模拟登录配置 -->
  <script src="auth.config.js"></script>
</head>
<body>
  <!-- ========== 登录视图 ========== -->
  <section id="loginView" class="view login-wrap">
    <div class="login-card">
      <div class="brand">
        <div class="brand-mark">¥</div>
        <h1>记账本</h1>
        <p class="brand-sub">轻量在线记账 · 数据存于本地浏览器</p>
      </div>

      <div class="security-tip" role="alert">
        ⚠️ 前端模拟登录，非真正鉴权，仅用于角色区分。凭证在前端可见，请勿在生产环境使用。
      </div>

      <form id="loginForm" class="login-form" autocomplete="off">
        <label class="field">
          <span>用户名</span>
          <input id="loginUser" type="text" placeholder="admin / user" required />
        </label>
        <label class="field">
          <span>密码</span>
          <input id="loginPass" type="password" placeholder="请输入密码" required />
        </label>
        <p id="loginError" class="login-error"></p>
        <button type="submit" class="btn btn-primary btn-block">登 录</button>
      </form>

      <div class="login-hint">
        体验账号：管理员 <code>admin / admin123</code>（可编辑）；普通用户 <code>user / user123</code>（只读）。
      </div>
    </div>
  </section>

  <!-- ========== 主视图 ========== -->
  <section id="mainView" class="view" style="display:none">
    <header class="topbar">
      <div class="topbar-left">
        <div class="brand-mark sm">¥</div>
        <div>
          <h1 class="topbar-title">记账本</h1>
          <p class="topbar-sub">当前用户：<b id="currentUser">—</b> · 角色：<b id="currentRole">—</b></p>
        </div>
      </div>
      <button id="btnLogout" class="btn btn-ghost">登出</button>
    </header>

    <main class="container">
      <!-- 操作工具栏（所有角色可用） -->
      <div class="toolbar">
        <label class="btn btn-secondary import-btn">
          导入 Excel
          <input id="importFile" type="file" accept=".xlsx,.xls" hidden />
        </label>
        <span class="toolbar-tip">支持 .xlsx，表头：日期 / 类型 / 分类 / 金额 / 备注</span>
      </div>

      <!-- 管理员编辑区（仅 admin 可见） -->
      <div id="adminArea" class="card admin-only">
        <h3 class="card-title">新增 / 编辑账目</h3>
        <form id="recordForm" class="record-form">
          <input type="hidden" id="fId" />
          <label class="field">
            <span>日期</span>
            <input id="fDate" type="date" required />
          </label>
          <label class="field">
            <span>类型</span>
            <select id="fType">
              <option value="支出">支出</option>
              <option value="收入">收入</option>
            </select>
          </label>
          <label class="field">
            <span>分类</span>
            <input id="fCategory" type="text" placeholder="如 餐饮 / 工资" required />
          </label>
          <label class="field">
            <span>金额</span>
            <input id="fAmount" type="number" step="0.01" min="0" placeholder="0.00" required />
          </label>
          <label class="field field-note">
            <span>备注</span>
            <input id="fNote" type="text" placeholder="可选" />
          </label>
          <div class="form-actions">
            <button type="submit" id="formSubmit" class="btn btn-primary">新增记录</button>
            <button type="button" id="formCancel" class="btn btn-ghost">取消</button>
          </div>
        </form>
      </div>

      <!-- 筛选 -->
      <div class="card filters">
        <div class="field inline">
          <span>类型</span>
          <select id="filterType">
            <option value="">全部</option>
            <option value="收入">收入</option>
            <option value="支出">支出</option>
          </select>
        </div>
        <div class="field inline">
          <span>分类</span>
          <select id="filterCategory">
            <option value="">全部分类</option>
          </select>
        </div>
      </div>

      <!-- 汇总 -->
      <div class="summary-grid">
        <div class="summary-card income">
          <span class="summary-label">收入合计</span>
          <span id="sumIncome" class="summary-value">¥0.00</span>
        </div>
        <div class="summary-card expense">
          <span class="summary-label">支出合计</span>
          <span id="sumExpense" class="summary-value">¥0.00</span>
        </div>
        <div class="summary-card balance">
          <span class="summary-label">结余</span>
          <span id="sumBalance" class="summary-value">¥0.00</span>
        </div>
      </div>

      <!-- 分类小计 -->
      <div class="card">
        <h3 class="card-title">分类小计</h3>
        <div id="catSubtotals" class="cat-subtotals"></div>
      </div>

      <!-- 图表 -->
      <div class="chart-grid">
        <div class="card">
          <h3 class="card-title">月度收支趋势</h3>
          <canvas id="chartLine" height="140"></canvas>
        </div>
        <div class="card">
          <h3 class="card-title">支出分类占比</h3>
          <canvas id="chartPie" height="140"></canvas>
        </div>
      </div>

      <!-- 流水表格 -->
      <div class="card">
        <h3 class="card-title">流水明细</h3>
        <div class="table-wrap">
          <table id="recordsTable">
            <thead>
              <tr>
                <th>日期</th>
                <th>类型</th>
                <th>分类</th>
                <th class="amt">金额</th>
                <th>备注</th>
                <th class="admin-only">操作</th>
              </tr>
            </thead>
            <tbody id="recordsBody"></tbody>
          </table>
        </div>
      </div>
    </main>
  </section>

  <script src="app.js"></script>
</body>
</html>
